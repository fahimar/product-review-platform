services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reviewdibo
      POSTGRES_PASSWORD: reviewdibo
      POSTGRES_DB: reviewdibo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewdibo -d reviewdibo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://reviewdibo:reviewdibo@db:5432/reviewdibo
      JWT_SECRET: change-me-in-production
      JWT_EXPIRE_MINUTES: "30"
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
